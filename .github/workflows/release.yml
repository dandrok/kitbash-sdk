# Publishes @ktbsh/sdk to the public npm registry (registry.npmjs.org)
# when you create a GitHub Release (Release button / tag).
#
# Prerequisites (repo Settings → Secrets and variables → Actions):
#   NPM_TOKEN — npm automation token with publish rights for @ktbsh/sdk
#
# Release checklist:
#   1. Bump `version` in packages/sdk/package.json (e.g. 0.1.3)
#   2. Commit & push to main (CI should be green)
#   3. GitHub → Releases → Draft a new release
#   4. Create tag `v0.1.3` (must match package.json version, with a leading `v`)
#   5. Publish the release → this workflow builds and runs `npm publish`
#
# Note: This targets npmjs.org, where @ktbsh/sdk is already published.
# GitHub Packages (npm.pkg.github.com) is a different registry and would need
# a different package scope/registry config — not used here.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish @ktbsh/sdk to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node (npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ktbsh'

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        working-directory: .
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(bun -e 'console.log(require("./packages/sdk/package.json").version)')"

          echo "GitHub release tag: ${TAG}"
          echo "package.json version: ${PKG_VERSION}"

          if [[ "${TAG}" != v* ]]; then
            echo "::error::Release tag must look like v0.1.3 (got '${TAG}')"
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "::error::Tag version '${TAG_VERSION}' does not match packages/sdk/package.json version '${PKG_VERSION}'. Bump package.json, commit, then re-tag."
            exit 1
          fi

      - name: Biome CI
        working-directory: .
        run: bun run ci

      - name: Build SDK + smoke tests
        working-directory: .
        run: bun run smoke

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
