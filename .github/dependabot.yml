# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # 1. Manage the Monorepo Root (where bun.lockb / bun.lock lives)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Groups minor/patch updates into single PRs to prevent spam
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # 2. Automatically discover and manage all Workspace Packages
  - package-ecosystem: "npm"
    directory: "/packages/*" # Assumes your monorepo apps live in a "packages" folder
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
